---
# VisualEyes Kubernetes Agent Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: visual-eyes-k8s-config
  namespace: kube-system
data:
  config-k8s.yaml: |
    collection:
      interval: 10s
      kubernetes:
        enabled: true
        node_metrics: true
        pod_metrics: true
      host:
        enabled: false
    output:
      remote:
        endpoint: "http://192.168.24.203:8080/api/kubernetes-metrics"
        batch_size: 100
        timeout: 5s 