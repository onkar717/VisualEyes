version: '3.8'

services:
  # Backend Server
  visual-eyes-server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: visual-eyes-server
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - PORT=${PORT:-8080}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/metrics/snapshot"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - visual-eyes-network

  # Frontend UI
  visual-eyes-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: visual-eyes-ui
    ports:
      - "3000:3000"
    depends_on:
      visual-eyes-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - visual-eyes-network

  # System Agent
  visual-eyes-system-agent:
    build:
      context: .
      dockerfile: agents/system/Dockerfile
    container_name: visual-eyes-system-agent
    environment:
      - VISUAL_EYES_CONFIG=${VISUAL_EYES_CONFIG:-/app/configs/config.yaml}
      - VISUAL_EYES_OUTPUT_REMOTE_ENDPOINT=http://visual-eyes-server:8080/api/system-metrics
      - VISUAL_EYES_AGENT_DISABLE_HOST_METRICS=${VISUAL_EYES_AGENT_DISABLE_HOST_METRICS:-false}
      - VISUAL_EYES_AGENT_DISABLE_KUBE_METRICS=${VISUAL_EYES_AGENT_DISABLE_KUBE_METRICS:-false}
    depends_on:
      visual-eyes-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visual-eyes-network
    # For system metrics collection, we need host access
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

networks:
  visual-eyes-network:
    driver: bridge
    name: visual-eyes-network
