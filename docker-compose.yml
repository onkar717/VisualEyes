version: '3.8'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: visual-eyes-postgres
    environment:
      POSTGRES_USER: visual_eyes
      POSTGRES_PASSWORD: visual_eyes
      POSTGRES_DB: visual_eyes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visual_eyes -d visual_eyes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - visual-eyes-network

  # ── Backend Server ────────────────────────────────────────────────────────
  visual-eyes-server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: visual-eyes-server
    ports:
      - "8080:8080"
    environment:
      VISUAL_EYES_SERVER_HOST: "0.0.0.0"
      VISUAL_EYES_SERVER_PORT: "8080"
      VISUAL_EYES_DATABASE_HOST: postgres
      VISUAL_EYES_DATABASE_PORT: "5432"
      VISUAL_EYES_DATABASE_USER: visual_eyes
      VISUAL_EYES_DATABASE_PASSWORD: visual_eyes
      VISUAL_EYES_DATABASE_DBNAME: visual_eyes
      VISUAL_EYES_DATABASE_SSLMODE: disable
      VISUAL_EYES_LOGGING_LEVEL: ${LOG_LEVEL:-info}
      VISUAL_EYES_LOGGING_FORMAT: ${LOG_FORMAT:-json}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VISUAL_EYES_RCA_ENABLED: ${VISUAL_EYES_RCA_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - visual-eyes-network

  # ── Frontend UI ───────────────────────────────────────────────────────────
  visual-eyes-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: visual-eyes-ui
    ports:
      - "3000:3000"
    depends_on:
      visual-eyes-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - visual-eyes-network

  # ── System Agent ──────────────────────────────────────────────────────────
  visual-eyes-system-agent:
    build:
      context: .
      dockerfile: agents/system/Dockerfile
    container_name: visual-eyes-system-agent
    environment:
      VISUAL_EYES_OUTPUT_REMOTE_ENDPOINT: http://visual-eyes-server:8080/api/system-metrics
      VISUAL_EYES_AGENT_COLLECTION_INTERVAL: "10"
    depends_on:
      visual-eyes-server:
        condition: service_healthy
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - visual-eyes-network

volumes:
  postgres-data:

networks:
  visual-eyes-network:
    driver: bridge
    name: visual-eyes-network
