name: PendingPods
description: Pods stuck in Pending state — scheduler cannot find a suitable node
severity: SEV2
tags: [scheduling, resources, pod-lifecycle]

symptoms:
  - Pods show Pending status in kubectl get pods
  - No nodes available for scheduling
  - Alert fired: reason=PodPending (stuck > threshold)

triage_steps:
  - step: 1
    description: Check all pending pods and their age
    command: "kubectl get pods -n {namespace} --field-selector status.phase=Pending"
    safe: true

  - step: 2
    description: Describe pending pod — Events will show scheduler reason
    command: "kubectl describe pod -n {namespace} {pod}"
    safe: true

  - step: 3
    description: Check node resource availability
    command: "kubectl describe nodes | grep -A5 'Allocated resources'"
    safe: true

  - step: 4
    description: Check if resource quota is exhausted in namespace
    command: "kubectl describe resourcequota -n {namespace}"
    safe: true

  - step: 5
    description: Check for node taints that block scheduling
    command: "kubectl get nodes -o custom-columns='NAME:.metadata.name,TAINTS:.spec.taints'"
    safe: true

common_causes:
  - cause: Insufficient CPU or memory on all nodes
    signal: "Events: 0/N nodes are available: N Insufficient cpu/memory"
    fix: "Add nodes to cluster; reduce pod resource requests; check for resource leaks"

  - cause: PersistentVolume not available or in wrong zone
    signal: "Events: 0/N nodes available: N node(s) had no available volume zone"
    fix: "Check PVC status; ensure StorageClass and zone match node availability"

  - cause: Pod requires specific node via nodeSelector or affinity
    signal: "Events: 0/N nodes available: N node(s) didn't match node selector"
    fix: "Check pod nodeSelector/affinity rules; label a node or relax constraints"

  - cause: All matching nodes tainted and pod has no tolerations
    signal: "Events: 0/N nodes available: N node(s) had untolerated taint"
    fix: "Add toleration to pod spec or remove taint from node"

  - cause: Namespace resource quota exhausted
    signal: "Events: exceeded quota: ... limited: requests.cpu / requests.memory"
    fix: "Increase ResourceQuota limits or reduce existing pod resource requests"

remediation:
  - scenario: Scale cluster node group (cloud managed)
    command: "kubectl get nodes"
    destructive: false
    confirm_required: false

  - scenario: Remove blocking taint from node to allow scheduling
    command: "kubectl taint nodes {node} {taint-key}-"
    destructive: false
    confirm_required: true

  - scenario: Delete stuck pending pod to force re-evaluation
    command: "kubectl delete pod -n {namespace} {pod}"
    destructive: true
    confirm_required: true
