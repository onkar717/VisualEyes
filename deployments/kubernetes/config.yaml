apiVersion: v1
kind: ConfigMap
metadata:
  name: visual-eyes-k8s-config
  namespace: kube-system
data:
  config.yaml: |
    # Kubernetes-specific agent configuration
    agent:
      collection_interval: 10
      disable_host_metrics: true  # Host metrics not available in K8s pods
      disable_kube_metrics: false # Enable Kubernetes metrics collection
    output:
      remote:
        enabled: true
        endpoint: "http://visual-eyes-backend:8080/api/kubernetes-metrics" 