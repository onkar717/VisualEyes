name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment
            or remove the `stale` label.
          close-issue-message: >
            Closing due to inactivity. Please reopen if this is still relevant,
            or open a new issue with updated context.
          close-issue-reason: "not planned"

          # Pull Requests
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been inactive for 21 days. It will be closed in 7 days
            unless there is new activity. Please rebase, address review comments, or
            leave a comment if you're still working on this.
          close-pr-message: >
            Closing due to inactivity. Please reopen when ready to continue.

          # Exempt labels
          exempt-issue-labels: "pinned,security,help-wanted,good-first-issue"
          exempt-pr-labels: "pinned,security,work-in-progress,wip"

          # Don't mark as stale if there's been a recent comment
          days-before-stale: -1
