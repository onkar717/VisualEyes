name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # -- Binary release ----------------------------------------------------------
  binaries:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Sync workspace
        run: go work sync

      - name: Run tests
        run: go test -race -count=1 ./server/... ./veye/... ./system-agent/... ./k8s-agent/...

      - name: Cross-compile binaries
        run: make cross

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/visual-eyes-linux-amd64
            dist/visual-eyes-linux-arm64
            dist/visual-eyes-darwin-amd64
            dist/visual-eyes-darwin-arm64
            dist/visual-eyes-windows-amd64.exe
            dist/veye-linux-amd64
            dist/veye-linux-arm64
            dist/veye-darwin-amd64
            dist/veye-darwin-arm64
            dist/veye-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: true

  # -- Container images ---------------------------------------------------------
  docker:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: server
            file: server/Dockerfile
            context: .
            image: visual-eyes-server
          - name: system-agent
            file: system-agent/Dockerfile
            context: .
            image: visual-eyes-agent
          - name: k8s-agent
            file: Dockerfile
            context: .
            image: visual-eyes-kube-agent
          - name: ui
            file: ui/Dockerfile
            context: ./ui
            image: visual-eyes-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (enables ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
