name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests (race detector + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector and coverage
        run: go test -v -race -count=1 -coverprofile=coverage-backend.out -covermode=atomic ./backend/...

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-backend.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  test-agents:
    name: Agent Tests (race detector + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run agent tests with race detector and coverage
        run: go test -v -race -count=1 -coverprofile=coverage-agents.out -covermode=atomic ./agents/...

      - name: Upload agent coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-agents.out
          flags: agents
          token: ${{ secrets.CODECOV_TOKEN }}

  test-cli:
    name: CLI Tests (race detector + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run CLI tests with race detector and coverage
        run: go test -v -race -count=1 -coverprofile=coverage-cli.out -covermode=atomic ./cli/...

      - name: Upload CLI coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-cli.out
          flags: cli
          token: ${{ secrets.CODECOV_TOKEN }}

  test-ui:
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Type check
        working-directory: ui
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ui
        run: npm run lint
