name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: Server Tests (race detector + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Sync workspace
        run: go work sync

      - name: Run tests with race detector and coverage
        run: go test -v -race -count=1 -coverprofile=coverage-server.out -covermode=atomic ./server/...

      - name: Upload server coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-server.out
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}

  test-agents:
    name: Agent Tests (race detector + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Sync workspace
        run: go work sync

      - name: Run agent tests with race detector and coverage
        run: go test -v -race -count=1 -coverprofile=coverage-agents.out -covermode=atomic ./system-agent/... ./k8s-agent/...

      - name: Upload agent coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-agents.out
          flags: agents
          token: ${{ secrets.CODECOV_TOKEN }}

  test-veye:
    name: veye CLI Tests (race detector + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Sync workspace
        run: go work sync

      - name: Run veye tests with race detector and coverage
        run: go test -v -race -count=1 -coverprofile=coverage-veye.out -covermode=atomic ./veye/...

      - name: Upload veye coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-veye.out
          flags: veye
          token: ${{ secrets.CODECOV_TOKEN }}

  test-ui:
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Type check
        working-directory: ui
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ui
        run: npm run lint
