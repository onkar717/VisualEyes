name: Greetings

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          issue_message: |
            👋 Thanks for opening your first issue on VisualEyes!

            To help us resolve this quickly:
            - For **bugs**: please include reproduction steps, your OS, Go/Node version, and any relevant logs (`make logs` or `kubectl logs`)
            - For **feature requests**: describe the problem it solves and any alternatives you've considered

            A maintainer will review this soon. In the meantime, check the [docs](https://github.com/onkar717/VisualEyes/tree/main/docs) and [INSTALLATION.md](https://github.com/onkar717/VisualEyes/blob/main/INSTALLATION.md)   your question may already be answered.

          pr_message: |
            👋 Thanks for your first pull request to VisualEyes!

            Before your PR is reviewed, please make sure:
            - [ ] `make test` passes locally
            - [ ] `make lint` passes (or `go vet ./...` at minimum)
            - [ ] You've filled out the PR template
            - [ ] CHANGELOG.md is updated if this is a user-facing change

            A maintainer will review your PR soon. Thanks for contributing! 🚀
