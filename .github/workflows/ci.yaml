name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Sync workspace
        run: go work sync

      - name: Build all modules
        run: make build

      - name: Run go vet (all modules)
        run: go vet ./server/... ./veye/... ./system-agent/... ./k8s-agent/...

      - name: Run tests with race detector
        run: go test -race -count=1 ./server/... ./veye/... ./system-agent/... ./k8s-agent/...

      - name: golangci-lint (server)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: server
        continue-on-error: true

      - name: Check large files (>10MB)
        run: find . -not -path './.git/*' -not -path './bin/*' -type f -size +10M | tee /dev/stderr | wc -l | grep -q '^0$'

  build-ui:
    name: UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build UI
        run: cd ui && npm run build

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .github/linters/.markdownlint.jsonc
          globs: "**/*.md"
        continue-on-error: true

  lint-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint . || true

  lint-python:
    name: Python Lint & Type Check (ai-sre)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-sre/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r ai-sre/requirements-dev.txt

      - name: ruff check
        run: ruff check ai-sre/

      - name: mypy type check
        run: mypy ai-sre/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  lint-shell:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: find . -not -path './.git/*' -name "*.sh" -exec shellcheck {} \; || true
