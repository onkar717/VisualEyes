name: high_cpu
description: Node or pod CPU usage is critically high causing throttling or degradation
triggers:
  - cpu.usage > 85
  - kubernetes.node.cpu.usage > 0.8
categories:
  - high_cpu
diagnosis:
  - Identify which pod/container is the top CPU consumer using kubelet metrics
  - Check if CPU throttling (throttled_periods_total) is high relative to total_periods_total
  - Look for GC pauses, tight loops, or CPU-bound batch jobs in application logs
  - Verify CPU requests and limits are set; missing limits allow noisy-neighbor saturation
  - Check load average vs. node CPU count   sustained load > N CPUs indicates starvation
  - Correlate spike timing with deployment events or scheduled jobs (CronJobs)
remediation:
  - step: 1
    description: Restart high-CPU deployment to clear runaway process
    command_template: "kubectl rollout restart deployment/{deployment} -n {namespace}"
    is_auto_safe: true
  - step: 2
    description: Scale deployment horizontally to distribute load
    command_template: "kubectl scale deployment {deployment} -n {namespace} --replicas=3"
    is_auto_safe: false
  - step: 3
    description: Set CPU limit to prevent node saturation
    command_template: "kubectl patch deployment {deployment} -n {namespace} --type=json -p='[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/resources/limits/cpu\",\"value\":\"500m\"}]'"
    is_auto_safe: false
