name: pending_pods
description: Pods stuck in Pending   scheduler cannot place them due to resource or taint constraints
triggers:
  - pod.phase = Pending
  - kubernetes.pod.status = Pending
categories:
  - pending
diagnosis:
  - Check pod events for scheduler messages: Insufficient cpu, Insufficient memory, or No nodes available
  - Look for taint/toleration mismatch   node has taint that pod doesn't tolerate
  - Verify PVC is bound   PVC in Pending blocks pod scheduling
  - Check if node affinity/nodeSelector is too restrictive (no matching nodes)
  - Inspect resource quotas in the namespace   quota exhaustion blocks new pods
  - Look for pod disruption budgets blocking eviction of lower-priority pods
remediation:
  - step: 1
    description: Delete competing low-priority pods to free scheduling capacity
    command_template: "kubectl delete pod {pod} -n {namespace}"
    is_auto_safe: false
  - step: 2
    description: Scale down non-critical deployments to free resources
    command_template: "kubectl scale deployment {deployment} -n {namespace} --replicas=0"
    is_auto_safe: false
  - step: 3
    description: Remove taint blocking scheduling
    command_template: "kubectl taint node {node} {taint_key}-"
    is_auto_safe: false
