name: oom
description: Container OOMKilled — killed by kernel due to memory exhaustion
triggers:
  - memory.usage_percent > 90
  - pod.reason = OOMKilled
categories:
  - oom
diagnosis:
  - Confirm OOMKilled exit code 137 in pod events or previous container state
  - Determine if memory.limit was set and how close to it the container was running
  - Check previous container logs for heap allocation failures just before kill
  - Distinguish single-kill (transient spike) from repeat OOM (persistent leak)
  - Look for Java/JVM -Xmx settings that exceed container limits
  - Verify no other containers on the node are also OOMing simultaneously (node-level issue)
remediation:
  - step: 1
    description: Delete OOMKilled pod so it restarts with a clean memory state
    command_template: "kubectl delete pod {pod} -n {namespace}"
    is_auto_safe: true
  - step: 2
    description: Increase memory limit to prevent repeat OOM kill
    command_template: "kubectl patch deployment {deployment} -n {namespace} --type=json -p='[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/resources/limits/memory\",\"value\":\"1Gi\"}]'"
    is_auto_safe: false
  - step: 3
    description: Scale down replicas temporarily to free node memory
    command_template: "kubectl scale deployment {deployment} -n {namespace} --replicas=1"
    is_auto_safe: false
