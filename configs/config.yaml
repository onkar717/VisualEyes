# VisualEyes Agent Configuration

agent:
  name: "visual-eyes-agent"
  interval: "15s"
  verbose: true
  collection_interval: 10
  disable_host_metrics: false
  disable_kube_metrics: false
  collectors:
    cpu: true
    memory: true
    disk: true
    network: true
    load: true

telemetry:
  metrics:
    enabled: true
    collectors:
      - "cpu"
      - "memory"
      - "disk"
      - "network"
      - "load"
    interval: "15s"

output:
  console:
    enabled: true
    format: "json"
  file:
    enabled: false
    path: /var/log/visual-eyes.log
  remote:
    enabled: true
    endpoint: "http://localhost:8080/api/system-metrics"
