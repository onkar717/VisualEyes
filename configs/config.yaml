# VisualEyes Agent Configuration
# Environment variables will override these default values

agent:
  # Collection interval in seconds (can be overridden by VISUAL_EYES_AGENT_COLLECTION_INTERVAL)
  collection_interval: 10
  # Disable host metrics collection (can be overridden by VISUAL_EYES_AGENT_DISABLE_HOST_METRICS)
  disable_host_metrics: false
  # Disable Kubernetes metrics collection (can be overridden by VISUAL_EYES_AGENT_DISABLE_KUBE_METRICS)
  disable_kube_metrics: false

output:
  remote:
    enabled: true
    # Remote endpoint for sending metrics (overridden by VISUAL_EYES_OUTPUT_REMOTE_ENDPOINT)
    endpoint: "http://localhost:8080/api/system-metrics"
