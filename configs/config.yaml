# VisualEyes Server & Agent Configuration
# All values can be overridden via VISUAL_EYES_* environment variables.

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "15s"
  write_timeout: "30s"
  shutdown_timeout: "10s"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst: 200

database:
  host: "localhost"
  port: 5432
  user: "visual_eyes"
  password: "visual_eyes"
  dbname: "visual_eyes"
  sslmode: "disable"
  timezone: "UTC"
  # dsn: ""  # set this to override individual fields above
  max_records: 10000  # max rows stored per metric name before pruning

logging:
  level: "info"   # debug | info | warn | error
  format: "text"  # text | json

alerts:
  enabled: true
  eval_interval: "15s"
  lookback_window: "5m"
  deduplicate_ttl: "10m"
  rules:
    - name: "cpu_spike_critical"
      metric_name: "cpu.usage"
      threshold: 85.0
      operator: "gt"
      severity: "critical"
    - name: "cpu_spike_warning"
      metric_name: "cpu.usage"
      threshold: 5.0
      operator: "gt"
      severity: "warning"
    - name: "memory_spike_critical"
      metric_name: "memory.usage_percent"
      threshold: 90.0
      operator: "gt"
      severity: "critical"
    - name: "memory_spike_warning"
      metric_name: "memory.usage_percent"
      threshold: 15.0
      operator: "gt"
      severity: "warning"
    - name: "disk_full_critical"
      metric_name: "disk.usage_percent"
      threshold: 95.0
      operator: "gt"
      severity: "critical"
    - name: "disk_full_warning"
      metric_name: "disk.usage_percent"
      threshold: 60.0
      operator: "gt"
      severity: "warning"
    - name: "k8s_node_cpu_high"
      metric_name: "kubernetes.node.cpu.usage"
      threshold: 0.1
      operator: "gt"
      severity: "warning"
    - name: "k8s_pod_crash_loop"
      metric_name: "kubernetes.pod.restart_count"
      threshold: 3.0
      operator: "gt"
      severity: "critical"

rca:
  enabled: false              # set true when ANTHROPIC_API_KEY is provided
  # api_key: ""               # prefer ANTHROPIC_API_KEY env var
  model: "claude-sonnet-4-5"
  max_tokens: 2048
  temperature: 0.1
  log_lines: 100
  metric_samples: 20
  agent_timeout_seconds: 120   # per-stage LLM timeout; total pipeline cap = 6× this

agent:
  collection_interval: 10
  disable_host_metrics: false
  disable_kube_metrics: false

output:
  remote:
    enabled: true
    endpoint: "http://localhost:8080/api/system-metrics"
